version: "3.8"

services:
  oracle-xe:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-xe
    environment:
      ORACLE_PASSWORD: oracle
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./db_oracle/schema-oracle.sql:/container-entrypoint-initdb.d/01-schema.sql
      - ./db_oracle/seed-data.sql:/container-entrypoint-initdb.d/02-seed-data.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  mariadb:
    image: mariadb:11
    container_name: mariadb
    environment:
      MARIADB_ROOT_PASSWORD: mariadb
      MARIADB_DATABASE: migration_db
      MARIADB_USER: mariadb
      MARIADB_PASSWORD: mariadb
    ports:
      - "3306:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./db_mariaDB/schema-mariadb.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mariadb", "-uroot", "-pmariadb", "-e", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: go-backend
    ports:
      - "8080:8080"
    environment:
      ORACLE_HOST: oracle-xe
      ORACLE_PORT: "1521"
      ORACLE_SERVICE: XEPDB1
      ORACLE_USER: system
      ORACLE_PASSWORD: oracle
      APP_PORT: "8080"
    depends_on:
      oracle-xe:
        condition: service_healthy
    restart: on-failure

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ./migrate
    profiles: ["migrate"]
    environment:
      ORACLE_HOST: oracle-xe
      ORACLE_PORT: "1521"
      ORACLE_SERVICE: XEPDB1
      ORACLE_USER: system
      ORACLE_PASSWORD: oracle
      MARIADB_HOST: mariadb
      MARIADB_PORT: "3306"
      MARIADB_DATABASE: migration_db
      MARIADB_USER: mariadb
      MARIADB_PASSWORD: mariadb
      BATCH_SIZE: "1000"
    depends_on:
      oracle-xe:
        condition: service_healthy
      mariadb:
        condition: service_healthy
    restart: "no"

volumes:
  oracle-data:
  mariadb-data:
